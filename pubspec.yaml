name: local_ocr
description: 本地OCR文字提取器 - 完全离线，保护隐私
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # OCR Core
  google_mlkit_text_recognition: ^0.13.0

  # Image handling
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  flutter_image_compress: ^2.3.0

  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Ads (Android only)
  google_mobile_ads: ^5.1.0

  # UI & UX
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  flutter_tts: ^4.2.0
  pdf: ^3.11.1
  printing: ^5.13.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - assets/store/
