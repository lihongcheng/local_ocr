name: local_ocr
description: 本地OCR文字提取器 - PP-OCRv5 完全离线，保护隐私
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── OCR 核心：PP-OCRv5（Android ONNX Runtime，iOS Apple Vision）──────────
  mobile_ocr:
    git:
      url: https://github.com/ente-io/mobile_ocr
      ref: main

  # ── 图片处理 ─────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  flutter_image_compress: ^2.3.0

  # ── 本地存储 ─────────────────────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── 广告（仅 Android，iOS 代码内部跳过）─────────────────────────────────
  google_mobile_ads: ^5.1.0

  # ── 权限 ─────────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── UI & 功能 ─────────────────────────────────────────────────────────────
  share_plus: ^10.0.2
  flutter_tts: ^4.2.0
  pdf: ^3.11.1
  printing: ^5.13.1
  intl: ^0.20.2
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  connectivity_plus: ^6.0.3   # 检测首次下载模型时的网络状态

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
    - assets/store/
